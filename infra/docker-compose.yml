version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: metacog_postgres
    environment:
      POSTGRES_DB: interview
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    container_name: metacog_api
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "uv sync && uv run uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/interview
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  pgdata:
